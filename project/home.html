<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Interface</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;

            background: linear-gradient(135deg, #1e3a8a, #2563eb, #60a5fa);
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.15);
            top: 10%;
            left: 10%;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: rgba(255, 255, 255, 0.1);
            bottom: 10%;
            right: 10%;
        }

        .query-card {
            z-index: 1;
            width: 100%;
            max-width: 550px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            padding: 2rem;
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn-custom {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border: none;
            font-weight: 600;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;

            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);

            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            color: #e2e8f0;

            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <div class="query-card">
        <h3 class="text-center mb-4">Query Interface</h3>

        <form onsubmit="handleQuery(event)">
            <div class="mb-3">
                <input type="text" id="query" class="form-control" placeholder="Enter your query..." required>
            </div>

            <button type="submit" class="btn btn-custom w-100">Submit</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        async function handleQuery(event) {
            event.preventDefault();

            const query = document.getElementById("query").value;
            const resultDiv = document.getElementById("result");

            resultDiv.innerText = "Processing...";

            try {
                const response = await fetch("http://127.0.0.1:8000/query", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();
                resultDiv.innerText = JSON.stringify(data.result, null, 4);

            } catch (error) {
                resultDiv.innerText = "Error occurred: " + error.message;
            }
        }
    </script>

</body>

</html>
